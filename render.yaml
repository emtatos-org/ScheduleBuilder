databases:
  - name: schedulebuilder-db
    plan: free
    databaseName: schedulebuilder

services:
  - type: web
    name: schedule-builder
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: schedulebuilder-api
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schedulebuilder-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
